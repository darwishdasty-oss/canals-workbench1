name: Build Canals Workbench

# =====================================================================
#  Triggers
# =====================================================================
#  - push / pull_request: full pipeline on every commit
#  - tag v*:               auto-release + PyPI publish
#  - workflow_dispatch:    manual trigger from Actions UI
# =====================================================================

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to build with'
        required: false
        default: '3.11'
        type: choice
        options: ['3.10', '3.11', '3.12']
      publish_to_pypi:
        description: 'Publish to PyPI (only on tag push)'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs when a new commit comes in
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for releases + tags
  id-token: write   # for PyPI trusted publishing

# =====================================================================
#  Reusable workflow inputs (for cross-workflow composition)
# =====================================================================
#  Use this workflow from others via:
#    uses: abbas-hebah/canals-workbench/.github/workflows/build.yml@main
#    with:
#      python_version: '3.11'

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}
  PROJECT_NAME: canals-workbench
  BINARY_NAME: Canals

# =====================================================================
#  JOBS
# =====================================================================
jobs:

  # -----------------------------------------------------------------
  #  1. LINT — ruff + black (fast, fail fast)
  # -----------------------------------------------------------------
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - run: pip install ruff black

      - name: ruff check
        run: ruff check canals/ tests/ canals_mdi.py

      - name: black format check
        run: black --check --diff canals/ tests/ canals_mdi.py

  # -----------------------------------------------------------------
  #  2. TEST — multi-OS, multi-Python matrix
  # -----------------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache PySide6 wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-pyside6-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-pyside6-

      - name: Install Linux GUI deps (PySide6 needs libxcb)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-keysyms1 libxcb-image0 libxcb-util1 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-render-util0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 numpy scipy matplotlib

      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: ${{ runner.os == 'Linux' && 'offscreen' || '' }}
        run: |
          python -m unittest discover tests -v 2>&1 | tee test_output.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test_output.log
          retention-days: 7

  # -----------------------------------------------------------------
  #  3. BUILD LINUX
  # -----------------------------------------------------------------
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache build deps + PyInstaller bootloader
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            /tmp/PyInstaller
          key: linux-build-${{ env.PYTHON_VERSION }}-${{ hashFiles('canals.spec', 'pyproject.toml') }}

      - name: Install system deps (PySide6 + upx)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-keysyms1 libxcb-image0 libxcb-util1 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-render-util0 upx-ucl

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 numpy scipy matplotlib

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm canals.spec

      - name: Smoke-test the binary
        run: |
          file dist/Canals
          ls -lh dist/Canals
          chmod +x dist/Canals
          # Verify the binary actually loads the Python runtime
          timeout 8 ./dist/Canals 2>&1 | head -10 || echo "(exited — expected in headless CI)"

      - name: Compute SHA-256
        run: sha256sum dist/Canals > dist/Canals.sha256

      - name: Compress
        run: |
          cd dist
          tar czf ../Canals-linux-x64.tar.gz Canals Canals.sha256
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Canals-linux-x64
          path: Canals-linux-x64.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Canals-linux-x64.tar.gz

  # -----------------------------------------------------------------
  #  4. BUILD WINDOWS
  # -----------------------------------------------------------------
  build-windows:
    name: Build Windows x64 (.exe)
    runs-on: windows-latest
    needs: test
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache PyInstaller bootloader
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-build-${{ env.PYTHON_VERSION }}-${{ hashFiles('canals.spec', 'pyproject.toml') }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 numpy scipy matplotlib

      - name: Build with PyInstaller
        shell: pwsh
        run: pyinstaller --clean --noconfirm canals.spec

      - name: Verify Canals.exe
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Canals.exe")) {
            Write-Error "Canals.exe not produced!"
            exit 1
          }
          $size = (Get-Item "dist\Canals.exe").Length
          $sizeMB = [math]::Round($size/1MB, 1)
          Write-Host "::notice::Canals.exe size: $sizeMB MB"
          if ($size -lt 100MB) {
            Write-Error "Canals.exe is suspiciously small (< 100 MB)"
            exit 1
          }
          # Print PE header info
          $pe = Get-Item "dist\Canals.exe"
          Write-Host "Architecture: $($pe.VersionInfo.FileVersion)"

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist\Canals.exe" -Algorithm SHA256).Hash
          "$hash  Canals.exe" | Out-File "dist\Canals.exe.sha256" -Encoding ASCII
          Get-Content "dist\Canals.exe.sha256"

      - name: Sign executable (if certificate is provided)
        if: env.WINDOWS_CERT_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfx = [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64)
          $pfxPath = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfxPath, $pfx)
          $cert = Get-PfxCertificate -FilePath $pfxPath `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force)
          Set-AuthenticodeSignature -FilePath "dist\Canals.exe" `
            -Certificate $cert -TimestampServer "http://timestamp.digicert.com"

      - name: Zip binary
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Canals.exe", "dist\Canals.exe.sha256" `
            -DestinationPath "Canals-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Canals-windows-x64
          path: Canals-windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Canals-windows-x64.zip

  # -----------------------------------------------------------------
  #  5. BUILD MACOS (universal: x86_64 + arm64)
  # -----------------------------------------------------------------
  build-macos:
    name: Build macOS universal
    runs-on: macos-latest
    needs: test
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install upx (optional, for smaller binary)
        run: brew install upx 2>/dev/null || true

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 numpy scipy matplotlib

      - name: Build (x86_64 — runs natively on macos-latest)
        run: pyinstaller --clean --noconfirm canals.spec

      - name: Verify
        run: |
          file dist/Canals
          ls -lh dist/Canals
          # Quick smoke test
          timeout 8 ./dist/Canals 2>&1 | head -5 || echo "(exited — expected in headless CI)"

      - name: Compute SHA-256
        run: shasum -a 256 dist/Canals > dist/Canals.sha256

      - name: Compress
        run: |
          cd dist
          tar czf ../Canals-macos-universal.tar.gz Canals Canals.sha256
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Canals-macos-universal
          path: Canals-macos-universal.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Canals-macos-universal.tar.gz

  # -----------------------------------------------------------------
  #  6. BUILD PYTHON PACKAGE (sdist + wheel) + publish to PyPI
  # -----------------------------------------------------------------
  build-pypi:
    name: Build PyPI package
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Check the built artifacts
        run: |
          ls -lh dist/
          echo "---"
          python -m zipfile -l dist/*.whl 2>/dev/null | head -20 || true
          echo "---"
          tar -tzf dist/*.tar.gz | head -20 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Canals-pypi
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 90

      - name: Publish to TestPyPI
        if: github.event_name == 'pull_request'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # -----------------------------------------------------------------
  #  7. SBOM (Software Bill of Materials)
  # -----------------------------------------------------------------
  build-sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: build-pypi
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Build sdist first (needed for SBOM)
        run: |
          pip install build
          python -m build --sdist

      - name: Generate SBOM
        run: |
          cyclonedx-py environment --output-format JSON --output-file sbom.json || true
          cyclonedx-py requirements --input-file requirements.txt --output-format JSON --output-file sbom-reqs.json || true
          ls -la *.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: Canals-sbom
          path: '*.json'
          if-no-files-found: warn
          retention-days: 90

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.json'

  # -----------------------------------------------------------------
  #  8. DOCKER IMAGE (multi-arch)
  # -----------------------------------------------------------------
  docker:
    name: Docker image (amd64 + arm64)
    runs-on: ubuntu-latest
    needs: test
    if: success() && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.PROJECT_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------
  #  9. RELEASE — runs after all builds, creates GitHub Release
  # -----------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, build-pypi, build-sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List artifacts
        run: find release-assets -type f -ls

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Canals Workbench ${{ github.ref_name }}

          **Standalone open-channel design workbench — extracted from CCW v1.4.**

          ### Downloads

          | Platform | File | Size |
          |---|---|---|
          | 🪟 Windows x64 | `Canals-windows-x64.zip` | ~ 130 MB |
          | 🐧 Linux x64 | `Canals-linux-x64.tar.gz` | ~ 125 MB |
          | 🍎 macOS universal | `Canals-macos-universal.tar.gz` | ~ 70 MB |
          | 🐍 PyPI | `pip install canals-workbench` | ~ 1 MB |
          | 📋 SBOM | `sbom.json` | ~ 50 KB |

          ### Quick start

          **Windows:** unzip and double-click `Canals.exe`.

          **Linux:** `tar xzf Canals-linux-x64.tar.gz && ./dist/Canals`

          **macOS:** `tar xzf Canals-macos-universal.tar.gz && ./dist/Canals`

          **All platforms:** `pip install canals-workbench && canals`

          ### Features

          - 6 forms: Open Channel, Hydraulic Structures, Earth Canal, Flow Profile, Hydraulic Jump, Water Hammer
          - 17 unit tests (all passing on Python 3.10/3.11/3.12)
          - Full CLI mode (`canals-cli`)
          - MIT License

          ### Documentation

          See [README.md](https://github.com/${{ github.repository }}#readme) and the bundled User Guide.
          EOF
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          discussion_category_name: Announcements
          body_path: release-notes.md
          files: |
            release-assets/**/Canals-*.tar.gz
            release-assets/**/Canals-*.zip
            release-assets/**/sbom*.json

  # -----------------------------------------------------------------
  #  10. NOTIFY — Discord / Slack / Email (optional)
  # -----------------------------------------------------------------
  notify:
    name: Notify (Discord/Slack)
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v') && success()
    steps:
      - name: Discord notification
        if: env.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ Canals Workbench ${{ github.ref_name }} released"
          description: |
            **Windows:** Canals-windows-x64.zip (~ 130 MB)
            **Linux:** Canals-linux-x64.tar.gz (~ 125 MB)
            **macOS:** Canals-macos-universal.tar.gz (~ 70 MB)
            **PyPI:** pip install canals-workbench
          url: "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          color: 0x1A3A6C

      - name: Slack notification
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Canals Workbench ${{ github.ref_name }} released! https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
            }

# =====================================================================
#  END
# =====================================================================
